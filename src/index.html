<!DOCTYPE html>
<html>
<head>
  <title>Create Project</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f4f4f4;
    }
    form {
      background: white;
      padding: 20px;
      max-width: 500px;
      border-radius: 8px;
    }
    input, textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 8px;
    }
    button {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Create Project</h2>

  <form id="projectForm">
    <input type="text" name="title" placeholder="Title" required />
    <input type="text" name="category" placeholder="Category" required />
    <input type="number" name="price" placeholder="Price" required />
    <input type="number" name="mrp" placeholder="MRP" required />
    <input type="text" name="type" placeholder="Type" required />
    <input type="text" name="apk_link" placeholder="APK Link" />
    <textarea name="description" placeholder="Description"></textarea>
    <input type="text" name="techstacks" placeholder="React,Node,MongoDB" />
    <input type="text" name="video" placeholder="Video URL" />
    
    <!-- IMPORTANT: name must match multer field -->
    <input type="file" name="images" multiple required />

    <button type="submit">Submit</button>
  </form>

  <script>
    const form = document.getElementById("projectForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch("http://localhost:5000/api/projects/", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          alert("Error: " + data.message);
        } else {
          alert("Project created successfully!");
          console.log(data);
        }

      } catch (error) {
        alert("Request failed");
        console.error(error);
      }
    });
  </script>

</body>
</html>
